<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PARQ Source Index</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="topbar"><h1>Source Index</h1><p>Repository areas and source artifact links for stakeholder navigation.</p></header>
  <nav class="nav"></nav>
  <main>
    <section class="page-meta">
      <div class="meta-item"><div class="meta-label">Last Updated</div><div class="meta-value" id="lastUpdated">Loading...</div></div>
      <div class="meta-item"><div class="meta-label">Source Artifact</div><div class="meta-value"><a id="sourceArtifact" href="../MASTER_INDEX.md">MASTER_INDEX.md</a></div></div>
    </section>
    <section class="grid cards-3" id="areas"></section>
    <h2 class="section-title">Indexed Artifacts</h2>
    <div class="table-wrap">
      <table>
        <thead><tr><th>ID</th><th>Name</th><th>Area</th><th>Owner</th><th>Status</th><th>Notes</th><th>Source</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <div class="footer">Static portal. Data source: <code>07_Portal/data/source-index.json</code>.</div>
  </main>
  <script src="assets/app.js"></script>
  <script>
    Portal.loadJson('data/source-index.json').then(data => {
      Portal.applyMeta(data);
      document.getElementById('areas').innerHTML = data.areas.map(a => `<article class="card">
        <h3>${Portal.escapeHtml(a.area)}</h3>
        <p>${Portal.escapeHtml(a.description)}</p>
        <p><strong>Indexed deliverables:</strong> ${a.deliverableCount}</p>
        ${Portal.sourceLink(a.source, 'Open folder')}
      </article>`).join('');
      document.getElementById('rows').innerHTML = data.items.map(i => `<tr>
        <td>${Portal.escapeHtml(i.id)}</td><td>${Portal.escapeHtml(i.name)}</td><td>${Portal.escapeHtml(i.area)}</td>
        <td>${Portal.escapeHtml(i.owner)}</td><td>${Portal.badge(i.status)}</td><td>${Portal.escapeHtml(i.notes)}</td><td>${Portal.sourceLink(i.source)}</td>
      </tr>`).join('');
    });
  </script>
</body>
</html>
