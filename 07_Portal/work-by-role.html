<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PARQ Work by Role</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="topbar"><h1>Work by Role</h1><p>Filtered entry points for Designer, Developer, QA, and Product Team.</p></header>
  <nav class="nav"></nav>
  <main>
    <section class="page-meta">
      <div class="meta-item"><div class="meta-label">Last Updated</div><div class="meta-value" id="lastUpdated">Loading...</div></div>
      <div class="meta-item"><div class="meta-label">Source Artifact</div><div class="meta-value"><a id="sourceArtifact" href="https://github.com/khempaphatama-bas/parq-integration/blob/main/MASTER_INDEX.md">MASTER_INDEX.md</a></div></div>
    </section>
    <section class="subnav" id="roleNav"></section>
    <section id="roles"></section>
    <div class="footer">Role pages are filtered entry points. They do not duplicate or rewrite source artifacts.</div>
  </main>
  <script src="assets/app.js"></script>
  <script>
    Portal.loadJson('data/role-access.json').then(data => {
      Portal.applyMeta(data);
      document.getElementById('roleNav').innerHTML = data.roles.map(role => `<a href="#${role.id}">${Portal.escapeHtml(role.role)}</a>`).join('');
      document.getElementById('roles').innerHTML = data.roles.map(role => `
        <section class="role-section" id="${role.id}">
          <h2 class="section-title">${Portal.escapeHtml(role.role)}</h2>
          <p>${Portal.escapeHtml(role.purpose)}</p>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Entry Point</th><th>Artifact</th><th>Status</th><th>Source Artifact</th><th>Related User Flow</th><th>Related System</th><th>Related Open Question</th><th>Last Updated</th></tr></thead>
              <tbody>
                ${role.links.map(link => `<tr><td>${Portal.escapeHtml(link.label)}</td><td>${Portal.escapeHtml(link.artifact)}</td><td>${Portal.badge(link.status)}</td><td>${Portal.sourceLink(link.sourceArtifact, 'Open source')}</td><td>${Portal.escapeHtml(link.relatedUserFlow)}</td><td>${Portal.escapeHtml(link.relatedSystem)}</td><td>${Portal.escapeHtml(link.relatedOpenQuestion)}</td><td>${data.lastUpdated}</td></tr>`).join('')}
              </tbody>
            </table>
          </div>
        </section>
      `).join('');
    });
  </script>
</body>
</html>
